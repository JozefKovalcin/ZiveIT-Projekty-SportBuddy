name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm run lint

      - name: Build
        run: corepack pnpm run build

  backend:
    name: Backend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    env:
      DATABASE_URL: postgresql://sportbuddy:sportbuddy123@localhost:5432/sportbuddy?schema=public
      BETTER_AUTH_SECRET: ci-placeholder-secret-minimum-32-characters
      BETTER_AUTH_URL: http://localhost:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""
      GEMINI_API_KEY: ""
      BREVO_API_KEY: ""
      BREVO_SENDER_EMAIL: no-reply@sportbuddy.local
      VAPID_PUBLIC_KEY: ""
      VAPID_PRIVATE_KEY: ""
      VAPID_SUBJECT: mailto:ci@example.com
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ""
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/backend/pnpm-lock.yaml

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: corepack pnpm exec prisma generate

      - name: Lint
        run: corepack pnpm run lint

      - name: Build
        run: corepack pnpm run build
